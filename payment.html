<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexPay | Payment</title>

<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

<style>
.payment-container{
  max-width:600px;
  margin:80px auto;
  padding:30px;
  background:#111;
  border-radius:12px;
  color:#fff;
}
.payment-container h2{
  margin-bottom:20px;
}
.payment-box{
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}
.payment-box select,
.payment-box input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#222;
  color:#fff;
}
.pay-btn{
  width:100%;
  padding:14px;
  background:#d8b45d;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}
.summary{
  margin-top:15px;
  font-size:14px;
  color:#ccc;
}
</style>
</head>

<body>

<div class="payment-container">

  <h2>💳 Buy Your Card</h2>

  <div class="payment-box">
    
    <label>Select Card Plan</label>
    <select id="plan">
      <option value="29">Visa Card - $29</option>
      <option value="59">Mastercard - $59</option>
    </select>

    <label>Enter Crypto Amount ($)</label>
    <input type="number" id="amount" placeholder="e.g. 100" />

    <div class="summary" id="summary">
      Total will appear here...
    </div>

    <button class="pay-btn" onclick="payNow()">Proceed Payment</button>

  </div>

</div>

<script>
const plan = document.getElementById("plan");
const amount = document.getElementById("amount");
const summary = document.getElementById("summary");

function updateSummary(){
  let fee = parseInt(plan.value);
  let load = parseInt(amount.value) || 0;
  let total = fee + load;

  summary.innerHTML = `
    Card Fee: $${fee} <br>
    Crypto Load: $${load} <br>
    <strong>Total Payment: $${total}</strong>
  `;
}

plan.addEventListener("change", updateSummary);
amount.addEventListener("input", updateSummary);

function payNow(){
  let fee = parseInt(plan.value);
  let load = parseInt(amount.value) || 0;

  if(load <= 0){
    alert("Enter amount bro");
    return;
  }

  let total = fee + load;

  // 👇 future: yaha real payment add hoga
  alert("Payment Success 🚀\nTotal: $" + total);

  // redirect dashboard
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";  const auth = getAuth();  if(auth.currentUser){   window.location.href = "dashboard.html"; }else{   window.location.href = "login.html"; }
}
</script>

</body>
</html>
