<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPay | Email Verified</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<main class="hero">
  <section class="hero-left">
    <div class="badge"><span></span> Email verified</div>

    <h1>Thank you for <br><strong>verifying your email.</strong></h1>

    <p>
      Your email verification is complete. You can now login with your email and password.
    </p>

    <div class="hero-actions">
      <a href="login.html" class="primary-btn">
        Go to Login <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>
  </section>

  <section class="hero-right">
    <div class="glow"></div>

    <div class="feature-card" style="width:min(430px,100%);position:relative;z-index:2;text-align:center;">
      <i class="fa-solid fa-circle-check"></i>
      <h3>Email Verified</h3>
      <p>Your NexPay account is ready for login.</p>
    </div>
  </section>
</main>

</body>
</html>
