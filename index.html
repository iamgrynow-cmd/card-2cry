<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
  <div class="logo">⚡ NexPay</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Pricing</a>
    <a href="#">Contact</a>
  </div>

  <div id="auth-buttons">
    <a href="login.html" class="btn ghost">Log in</a>
    <a href="signup.html" class="btn gold">Sign up</a>
  </div>
</div>

<section class="hero">
  <div class="hero-left">
    <h1>Create a secure <br><span>crypto card.</span></h1>
    <p>Premium virtual cards for global payments.</p>

    <div class="hero-buttons">
      <a href="signup.html" class="btn gold">Create Account</a>
    </div>
  </div>

  <div class="hero-right">
    <div class="card-ui">
      <h3>NexPay</h3>
      <p class="card-number">•••• 8294</p>

      <div class="card-bottom">
        <div>
          <small>Holder</small>
          <p id="card-name">NEXPAY USER</p>
        </div>
        <div>
          <small>Status</small>
          <p class="active">ACTIVE</p>
        </div>
      </div>
    </div>
  </div>
</section>

<script type="module">
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { app } from "./firebase-config.js";

const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("auth-buttons").innerHTML = `
      <a href="dashboard.html" class="btn gold">Dashboard</a>
      <button onclick="logout()" class="btn ghost">Logout</button>
    `;

    let name = user.displayName || user.email.split("@")[0];
    document.getElementById("card-name").innerText = name.toUpperCase();

  } else {
    document.getElementById("auth-buttons").innerHTML = `
      <a href="login.html" class="btn ghost">Log in</a>
      <a href="signup.html" class="btn gold">Sign up</a>
    `;
  }
});

window.logout = async () => {
  await signOut(auth);
  location.reload();
};
</script>

</body>
</html>
