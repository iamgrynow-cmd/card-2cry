<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexPay | Crypto Cards</title>

<link rel="stylesheet" href="./style.css?v=7" />

</head>

<body>

<header class="nav">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h2>NexPay</h2>
      <p>Crypto Cards</p>
    </div>
  </div>

  <nav class="desktop-nav">
    <a href="#">Home</a>
    <a href="#">Pricing</a>
    <a href="#">Contact</a>
  </nav>

  <div class="nav-btns">
    <a href="login.html" class="login">Log in</a>
    <a href="signup.html" class="signup">Sign up</a>
  </div>

  <button class="menu-toggle" id="menuToggle">☰</button>
</header>

<div class="mobile-menu" id="mobileMenu">
  <a href="#">Home</a>
  <a href="#">Pricing</a>
  <a href="#">Contact</a>
  <a href="login.html">Log in</a>
  <a href="signup.html">Sign up</a>
</div>

<main class="hero">
  <section class="hero-left">
    <h1>Create a secure <br><span>crypto card.</span></h1>
    <p>Premium virtual cards for global payments.</p>

    <div class="hero-actions">
      <a href="signup.html" class="primary-btn">Create Account →</a>
      <a href="#" class="secondary-btn">Explore Cards</a>
    </div>
  </section>

  <section class="hero-right">
    <div class="card">
      <div class="card-top">
        <h2>NexPay</h2>
      </div>

      <div class="card-number">•••• 8294</div>

      <div class="card-bottom">
        <div>
          <small>Holder</small>
          <h4>NEXPAY USER</h4>
        </div>
        <div>
          <small>Status</small>
          <h4 class="active">ACTIVE</h4>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
const menuToggle=document.getElementById("menuToggle");
const mobileMenu=document.getElementById("mobileMenu");

menuToggle.onclick=()=>{
  mobileMenu.classList.toggle("active");
};
</script>

</body>
</html>
