<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexPay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css?v=10">

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">⚡ NexPay</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">Pricing</a>
    <a href="#">Contact</a>
  </div>

  <div id="auth-buttons">
    <a href="login.html" class="btn ghost">Log in</a>
    <a href="signup.html" class="btn gold">Sign up</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">

  <div class="hero-left">
    <h1>Create a secure <br><span>crypto card.</span></h1>
    <p>Premium virtual cards for global payments.</p>

    <div class="hero-buttons">
      <a href="signup.html" class="btn gold">Create Account</a>
      <a href="#" class="btn dark">Explore Cards</a>
    </div>
  </div>

  <div class="hero-right">
    <div class="card-ui">
      <h3>NexPay</h3>
      <p class="card-number">•••• 8294</p>

      <div class="card-bottom">
        <div>
          <small>Holder</small>
          <p id="card-name">NEXPAY USER</p>
        </div>
        <div>
          <small>Status</small>
          <p class="active">ACTIVE</p>
        </div>
      </div>
    </div>
  </div>

</section>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGwpH-JYuYK4kkUpf3cCsp-Im4urQW9Lk",
  authDomain: "nexpay-crypto-card.firebaseapp.com",
  projectId: "nexpay-crypto-card",
  storageBucket: "nexpay-crypto-card.firebasestorage.app",
  messagingSenderId: "120822872109",
  appId: "1:120822872109:web:9079b4cf4f0cade9c620a4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

  const authBox = document.getElementById("auth-buttons");

  if (user && user.emailVerified) {

    authBox.innerHTML = `
      <a href="dashboard.html" class="btn gold">Dashboard</a>
      <button class="btn ghost" id="logoutBtn">Logout</button>
    `;

    let name = user.displayName || user.email.split("@")[0];

    const cardName = document.getElementById("card-name");
    if(cardName){
      cardName.innerText = name.toUpperCase();
    }

    document.getElementById("logoutBtn").onclick = async () => {
      await signOut(auth);
      location.reload();
    };

  } else {

    authBox.innerHTML = `
      <a href="login.html" class="btn ghost">Log in</a>
      <a href="signup.html" class="btn gold">Sign up</a>
    `;
  }

});
</script>

</body>
</html>
