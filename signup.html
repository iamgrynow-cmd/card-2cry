<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPay | Sign Up</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
.auth-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.auth-box{
  width:100%;
  max-width:420px;
  background:#15151d;
  padding:30px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.05);
}

.auth-box h2{
  margin-bottom:20px;
}

.auth-box input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0b0b0f;
  color:#fff;
}

.auth-box button{
  width:100%;
  margin-top:16px;
  padding:14px;
  background:#d8b45d;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

#msg{
  margin-top:12px;
  font-size:14px;
}
</style>

</head>

<body>

<div class="auth-wrapper">

  <div class="auth-box">
    <h2>Create Account</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>

    <p id="msg"></p>

    <p style="margin-top:10px;">
      Already have account?
      <a href="login.html" style="color:#d8b45d;">Login</a>
    </p>
  </div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { 
  getAuth,
  createUserWithEmailAndPassword,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGwpH-JYuYK4kkUpf3cCsp-Im4urQW9Lk",
  authDomain: "nexpay-crypto-card.firebaseapp.com",
  projectId: "nexpay-crypto-card",
  storageBucket: "nexpay-crypto-card.firebasestorage.app",
  messagingSenderId: "120822872109",
  appId: "1:120822872109:web:9079b4cf4f0cade9c620a4",
  measurementId: "G-KQE5VRLX4F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  try{

    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await sendEmailVerification(userCred.user);

    msg.style.color = "#4ade80";
    msg.innerText = "Verification email sent. Check your inbox.";

    setTimeout(()=>{
      window.location.href = "login.html";
    },2000);

  }catch(err){
    msg.style.color = "#ff6b6b";
    msg.innerText = err.message;
  }

}
</script>

</body>
</html>
