<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPay | Sign Up</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header class="nav">
  <a class="logo" href="index.html">
    <div class="logo-icon">⚡</div>
    <div><h2>NexPay</h2><p>Crypto Cards</p></div>
  </a>

  <nav class="desktop-nav">
    <a href="index.html">Home</a>
    <a href="virtual-cards.html">Virtual Cards</a>
    <a href="pricing.html">Pricing</a>
    <a href="faq.html">FAQ</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="nav-btns">
    <a href="login.html" class="login">Log in</a>
    <a href="signup.html" class="signup">Sign up</a>
  </div>
</header>

<main class="hero">
  <section class="hero-left">
    <div class="badge"><span></span> Create account</div>
    <h1>Create your <br><strong>NexPay account.</strong></h1>
    <p>Enter your name, email and password. We’ll send a verification link to your email.</p>
  </section>

  <section class="hero-right">
    <div class="glow"></div>

    <form class="feature-card" id="signupForm" style="width:min(430px,100%);position:relative;z-index:2;">
      <i class="fa-solid fa-user-plus"></i>
      <h3>Create Account</h3>
      <p>Email verification is required before login.</p>

      <input id="name" type="text" placeholder="Full name" required
      style="width:100%;margin-top:20px;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:#fff;outline:none;">

      <input id="email" type="email" placeholder="Email address" required
      style="width:100%;margin-top:14px;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:#fff;outline:none;">

      <input id="password" type="password" placeholder="Password" required
      style="width:100%;margin-top:14px;padding:16px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:#fff;outline:none;">

      <button type="submit" class="primary-btn" style="width:100%;margin-top:18px;">
        Sign Up <i class="fa-solid fa-arrow-right"></i>
      </button>

      <p id="msg" style="margin-top:16px;color:#d8b45d;font-weight:800;"></p>

      <p style="margin-top:18px;text-align:center;">
        Already have account?
        <a href="login.html" style="color:#d8b45d;font-weight:800;">Login</a>
      </p>
    </form>
  </section>
</main>

<script type="module">
import {
  auth,
  createUserWithEmailAndPassword,
  sendEmailVerification,
  updateProfile
} from "./firebase.js";

const form = document.getElementById("signupForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);

    await updateProfile(userCred.user, {
      displayName: name
    });

    await sendEmailVerification(userCred.user, {
      url: "https://iamgrynow-cmd.github.io/card-2cry/verify.html"
    });

    msg.style.color = "#42e89b";
    msg.innerText = "Verification email sent. Please check your inbox.";

  } catch (error) {
    msg.style.color = "#ff8080";
    msg.innerText = error.message;
  }
});
</script>

</body>
</html>
