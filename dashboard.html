<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexPay Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#05060a;
  color:#fff;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:20px 5%;
  border-bottom:1px solid rgba(255,255,255,.1);
}

/* LAYOUT */
.container{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  padding:20px;
  border-right:1px solid rgba(255,255,255,.1);
}

.sidebar a{
  display:block;
  padding:14px;
  margin-bottom:10px;
  border-radius:12px;
  color:#aaa;
}

.sidebar a.active{
  background:#111;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
}

.card-box{
  background:rgba(255,255,255,.05);
  padding:25px;
  border-radius:20px;
  margin-top:20px;
}

.gold{
  color:#d8b45d;
}

/* MOBILE */
@media(max-width:900px){
  .container{flex-direction:column;}
  .sidebar{width:100%;display:flex;overflow:auto;}
}
</style>
</head>

<body>

<div class="topbar">
  <h2>NexPay Dashboard</h2>
  <button onclick="logout()">Log out</button>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <a class="active">Dashboard</a>
  <a>My Cards</a>
  <a>Transactions</a>
  <a>Funding</a>
  <a>Limits</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Welcome, <span id="userName">User</span></h2>

<div class="card-box">
  <h3>Your Plan</h3>
  <h2 class="gold" id="planName">No Plan Selected</h2>
</div>

<div class="card-box">
  <h3>Card Status</h3>
  <p id="cardStatus">No card created yet</p>
</div>

<div class="card-box">
  <h3>Transactions</h3>
  <p>No transactions yet</p>
</div>

</div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("nexpay_user"));
const plan = localStorage.getItem("selected_plan");

if(user){
  document.getElementById("userName").textContent = user.name;
}

if(plan){
  document.getElementById("planName").textContent = plan;
  document.getElementById("cardStatus").textContent = "Card Ready (Demo)";
}

function logout(){
  localStorage.removeItem("nexpay_user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
