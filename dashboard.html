<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPay Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{background:#000;color:#fff;font-family:Inter,sans-serif;margin:0}

/* HEADER */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 40px;border-bottom:1px solid rgba(255,255,255,.1)
}

.logout{
  padding:10px 18px;border-radius:999px;border:1px solid #444;
  background:#111;color:#fff;cursor:pointer
}

/* MAIN */
.main{padding:40px}

.card-ui{
  max-width:420px;padding:25px;border-radius:20px;margin-top:20px;
  background:linear-gradient(135deg,#111,#000);
  border:1px solid #333
}

.card-ui-number{
  margin:30px 0;font-size:22px;letter-spacing:5px
}

.chip{
  width:50px;height:35px;background:gold;border-radius:10px
}

.stats{
  display:flex;gap:20px;margin-top:30px
}

.stat{
  background:#111;padding:20px;border-radius:15px
}

/* BUTTON */
.btn{
  margin-top:20px;padding:12px 20px;border-radius:999px;
  background:gold;color:#000;font-weight:bold;cursor:pointer
}

/* MODAL */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center
}

.modal-box{
  background:#111;padding:30px;border-radius:20px;width:300px
}

input{
  width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none
}

.table{margin-top:30px;width:100%}
.table td{padding:10px;border-bottom:1px solid #333}
</style>
</head>

<body>

<div class="header">
  <h2>NexPay Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Welcome, <span id="userName"></span></h1>

<!-- CARD -->
<div class="card-ui">
  <div style="display:flex;justify-content:space-between">
    <div>
      <h3>NexPay</h3>
      <p id="cardPlan">No Plan</p>
    </div>
    <div class="chip"></div>
  </div>

  <div class="card-ui-number">•••• 4582 9210</div>

  <div style="display:flex;justify-content:space-between">
    <div>
      <small>Holder</small>
      <h4 id="cardUser"></h4>
    </div>
    <div>
      <small>Status</small>
      <h4 id="status">PENDING</h4>
    </div>
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <p>Balance</p>
    <h2>$<span id="balance">0</span></h2>
  </div>

  <div class="stat">
    <p>Transactions</p>
    <h2 id="txCount">0</h2>
  </div>
</div>

<button class="btn" onclick="openModal()">Add Funds</button>

<!-- TRANSACTION TABLE -->
<table class="table" id="txTable"></table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add Funds</h3>
    <input type="number" id="amount" placeholder="Enter amount">
    <button class="btn" onclick="addFunds()">Add</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const user = JSON.parse(localStorage.getItem("nexpay_user")) || {};
  const plan = localStorage.getItem("selected_plan");
  const isLoggedIn = localStorage.getItem("isLoggedIn");

  if (isLoggedIn !== "true") {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("userName").textContent = user.name || "User";
  document.getElementById("cardUser").textContent = user.name || "USER";

  if (plan) {
    document.getElementById("cardPlan").textContent = plan;
    document.getElementById("status").textContent = "ACTIVE";
  }

  loadData();
});

function logout(){
  localStorage.removeItem("isLoggedIn");
  window.location.href="login.html";
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function addFunds(){
  const amt = Number(document.getElementById("amount").value);
  if(!amt) return;

  let balance = Number(localStorage.getItem("balance") || 0);
  balance += amt;

  localStorage.setItem("balance", balance);

  let tx = JSON.parse(localStorage.getItem("transactions") || "[]");
  tx.push({
    type:"Deposit",
    amount:amt,
    date:new Date().toLocaleString()
  });

  localStorage.setItem("transactions", JSON.stringify(tx));

  closeModal();
  loadData();
}

function loadData(){
  const balance = localStorage.getItem("balance") || 0;
  const tx = JSON.parse(localStorage.getItem("transactions") || "[]");

  document.getElementById("balance").textContent = balance;
  document.getElementById("txCount").textContent = tx.length;

  const table = document.getElementById("txTable");
  table.innerHTML = "";

  tx.reverse().forEach(t=>{
    table.innerHTML += `
      <tr>
        <td>${t.type}</td>
        <td>$${t.amount}</td>
        <td>${t.date}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
