<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | NexPay</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <!-- TOP BAR -->
  <div class="dash-top">
    <h2>Welcome, <span id="user-name">User</span></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- CARD UI -->
  <div class="card-ui">
    <h3>NexPay</h3>
    <p class="card-number" id="card-number">•••• **** 8294</p>

    <div class="card-bottom">
      <div>
        <small>Holder</small>
        <p id="card-holder">USER</p>
      </div>
      <div>
        <small>Status</small>
        <p class="active">ACTIVE</p>
      </div>
    </div>
  </div>

  <!-- USER INFO -->
  <div class="user-box">
    <p><b>Email:</b> <span id="user-email"></span></p>
    <p><b>Plan:</b> <span id="user-plan">Not Purchased</span></p>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"));

// 🔴 NOT LOGGED IN → REDIRECT
if (!user) {
  window.location.href = "login.html";
}

// 🔥 DATA SET
document.getElementById("user-name").innerText = user.name || "User";
document.getElementById("card-holder").innerText = (user.name || "USER").toUpperCase();

// 🔥 EMAIL SHORT (IMPORTANT CHANGE)
let email = user.email || "";
let shortEmail = email.split("@")[0];
document.getElementById("user-email").innerText = shortEmail + "@...";

// 🔥 CARD MASK LOGIC
if (user.plan) {
  document.getElementById("user-plan").innerText = user.plan;

  // paid → show last 4
  document.getElementById("card-number").innerText = "**** **** 8294";
} else {
  // unpaid → more hidden
  document.getElementById("card-number").innerText = "**** **** ****";
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
